    }
  }

  // ── Animate the fold ─────────────────────────────────────────────────
  // Sort by depth ASCENDING — innermost (topmost, depth=1) hinge fires first.
  const sortedHinges = [...obeliskState.hinges].sort((a, b) => a.depth - b.depth);

  const tl = gsap.timeline({
    onComplete: () => {
      // STEP 1: Engrave numerals on the now-settled segments (composite only).
      // Prime divisors already have their supernova shader applied immediately
      // on segment creation (before the fold animation). Composite divisors get
      // their gravity-aware numeral engraved here, after the fold settles so
      // we can read the world orientation correctly.
      const segH = obeliskState.divisor * CUBE_SIZE;
      if (!divisorIsPrime) {
        for (const seg of obeliskSegments) {
          engraveNumeralOnSegment(seg.mesh, obeliskState.divisor, segH);
        }
      }

      // Capture whether this factor is new (for trinket-drop gating) BEFORE
      // createTrinket runs its dedup check so we can branch cleanly.
      const isNewFactor = !altarTrinkets.some((t) => t.label === obeliskState.divisor);
      const isNewPrime = divisorIsPrime && !primeDexRegistered.has(obeliskState.divisor);

      // Record that this factor has been surfaced in this room, and check
      // whether the room is now fully factored (wakes the exit sigil).
      surfacedFactors.add(obeliskState.divisor);
      checkRoomFullyFactored();

      // STEP 2: If this factor is new to this room, drop the trinket onto the
      // altar in its correct numerical slot.
      if (isNewFactor) {
        const matType = divisorIsPrime ? "prime" : "composite";
        // Small delay so the "settling thud" on the segments reads as complete
        // before the trinket begins its entrance.
        gsap.delayedCall(0.25, () => {
          createTrinket(obeliskState.divisor, matType);

          // STEP 3: Then, if this prime hasn't been registered to the dex yet,
          // play the registration animation.
          if (isNewPrime) {
            gsap.delayedCall(0.55, () => {
              const sourceSeg = obeliskSegments[obeliskSegments.length - 1];
              triggerPrimeDiscovery(obeliskState.divisor, sourceSeg);
              primeDexRegistered.add(obeliskState.divisor);

              // STEP 4: Reveal handle after registration kicks off.
              gsap.delayedCall(0.3, () => {
                foldingActive = false;
                foldingComplete = true;
                revealHandle();
                lastInteractionTime = performance.now() / 1000;
              });
            });
          } else {
            // No dex registration needed — reveal handle right after trinket lands.
            gsap.delayedCall(0.5, () => {
              foldingActive = false;
              foldingComplete = true;
              revealHandle();
              lastInteractionTime = performance.now() / 1000;
            });
          }
        });
      } else {
        // Factor already seen — skip trinket entirely. Same for dex registration
        // since that hinges on trinket-drop being part of the sequence.
        foldingActive = false;
        foldingComplete = true;
        revealHandle();
        lastInteractionTime = performance.now() / 1000;
      }
    },
  });

  sortedHinges.forEach((h, i) => {
    tl.to(
      h.group.rotation,
      {
        z: h.targetRot,
        duration: 1.2,
        ease: "bounce.out",
        onStart: () => {
          // tiny haptic-equivalent: camera micro-shake at start of each fall
          if (i === 0) cameraShake(0.08, 0.1);
        },
        onComplete: () => {
          playThud();
          cameraShake(0.2, 0.25);
        },
      },
      i * 0.15 // stagger — matches old app's 0.15s stagger
    );
  });

  // Prime-discovery dex-drop is triggered from the fold timeline's onComplete
  // above (once segments have settled and had their material swapped).
}

// Helper — create a single obelisk segment mesh of given height. An optional
// numeral is engraved on the front face (+Z), which can be toggled on/off.
// Pass `numeral: null` to create a blank segment (used during the fold
// animation; numerals are applied after the accordion settles so the text
// doesn't appear upside-down mid-flip).
function createSegmentMesh(segH, numeral = null) {
  const geo = new THREE.BoxGeometry(CUBE_SIZE, segH, CUBE_SIZE);

  const baseMat = createCompositeMaterial();

  // Build a front-face material — blank by default, engraved numeral if requested.
  const frontMat = createCompositeMaterial();
  if (numeral !== null) {
    const units = Math.max(1, Math.round(segH / CUBE_SIZE));
    // Canvas aspect matches the face aspect (1 wide × `units` tall) so the
    // numeral renders without stretching.
    const canvas = document.createElement("canvas");
    canvas.width = 256;
    canvas.height = 256 * units;
    const ctx = canvas.getContext("2d");
    // Aluminum base tint — matches the brushed aluminum bead material color
    ctx.fillStyle = "#c0c0c0";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    // Engraved-look numeral — dark, slight inset feel
    ctx.fillStyle = "rgba(20,22,28,0.55)";
    ctx.font = `bold ${Math.min(canvas.width, canvas.height) * 0.6}px 'Lexend', sans-serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(String(numeral), canvas.width / 2, canvas.height / 2);

    const tex = new THREE.CanvasTexture(canvas);
    tex.anisotropy = 8;
    frontMat.map = tex;
    frontMat.needsUpdate = true;
  }

  // BoxGeometry face order: [+X, -X, +Y, -Y, +Z, -Z]; front face (toward camera) = +Z
  const materials = [baseMat, baseMat, baseMat, baseMat, frontMat, baseMat];

  const mesh = new THREE.Mesh(geo, materials);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  // Stash a reference to the front material so we can swap in a numeral later
  mesh.userData.frontMat = frontMat;
  return mesh;
}

// Engrave a numeral onto a segment's front face (called after fold completes).
// "Gravity-aware": samples the segment's world orientation so the numeral is
// always upright (top of the number toward the ceiling) regardless of whether
// the segment flipped an even or odd number of times.
function engraveNumeralOnSegment(mesh, numeral, segH) {
  // Determine world orientation: transform the segment's local +Y into world
  // space. If world-Y is negative, the segment is upside-down and we need to
  // flip the numeral canvas so it reads upright to the viewer.
  mesh.updateWorldMatrix(true, false);
  const worldUp = new THREE.Vector3(0, 1, 0).applyQuaternion(mesh.getWorldQuaternion(new THREE.Quaternion()));
  const inverted = worldUp.y < 0;

  const units = Math.max(1, Math.round(segH / CUBE_SIZE));
  const canvas = document.createElement("canvas");
  canvas.width = 256;
  canvas.height = 256 * units;
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "#c0c0c0";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (inverted) {
    // Pre-rotate the canvas 180° so the baked texture renders upside-down
    // relative to its own UVs. Once applied to an upside-down mesh face,
    // those two inversions cancel → upright numeral in world space.
    ctx.translate(canvas.width, canvas.height);
    ctx.rotate(Math.PI);
  }

  ctx.fillStyle = "rgba(20,22,28,0.55)";
  ctx.font = `bold ${Math.min(canvas.width, canvas.height) * 0.6}px 'Lexend', sans-serif`;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(String(numeral), canvas.width / 2, canvas.height / 2);

  const tex = new THREE.CanvasTexture(canvas);
  tex.anisotropy = 8;

  const frontMat = mesh.userData.frontMat;
  if (frontMat) {
    if (frontMat.map) frontMat.map.dispose();
    frontMat.map = tex;
    frontMat.needsUpdate = true;
  }
}

// Swap a segment's material to the prime supernova shader. Used when the
// user chose a prime divisor so each resulting segment visibly glows with
// the plasma material. Done after fold settles to avoid running the
// expensive shader during the animation.
// Gravity-aware: checks the segment's world orientation so the numeral baked
// into the plasma reads upright regardless of how many 180° flips it took.
function applyPrimeMaterialToSegment(mesh, numeral) {
  mesh.updateWorldMatrix(true, false);
  const worldUp = new THREE.Vector3(0, 1, 0).applyQuaternion(mesh.getWorldQuaternion(new THREE.Quaternion()));
  const inverted = worldUp.y < 0;

  const primeMat = createPrimeMaterial(numeral, inverted);
  mesh.material = primeMat;
  mesh.userData.frontMat = null; // numeral is baked into the shader uniform
  primeShaderMeshes.push(mesh);
  const pl = new THREE.PointLight(0xff6600, 1.5, 3, 2);
  mesh.add(pl);
}

// ── Reveal Handle (after fold completes) ────────────────────────────
// The "handle" is the original top edge of the topmost obelisk segment —
// that is, the innermost segment in our nested hinge tree. Its local +Y edge
// was the original top of the intact obelisk. After the accordion settles,
// that edge may be up in the air (even number of falls) or on the floor (odd).
// Either way, we attach a thin glowing strip to that specific edge of that
// specific segment, plus a forgiving tap target around it. The glow "breathes"
// with the same neon-green cadence as the idle hinges.
function revealHandle() {
  const endSeg = obeliskSegments[obeliskSegments.length - 1];
  if (!endSeg) return;
  const segH = obeliskState.divisor * CUBE_SIZE;

  // Build a small THREE.Group parented to the end segment. The group sits at
  // the segment's local +Y edge (its original top). Because it's parented, it
  // will follow the segment's world position even though the segment itself
  // may be upside-down.
  const handleGroup = new THREE.Group();
  handleGroup.position.set(0, segH / 2, 0); // local +Y edge of the segment
  endSeg.mesh.add(handleGroup);

  // Thin glowing strip along the edge — long axis is the segment's local X
  // (which ends up pointing in world-X direction since we only ever rotate
  // around world Z). Looks like a lit edge of the block.
  const stripGeo = new THREE.BoxGeometry(CUBE_SIZE * 1.02, 0.08, CUBE_SIZE * 0.14);
  const stripMat = new THREE.MeshStandardMaterial({
    color: 0x0a2015,
    metalness: 0.1,
    roughness: 0.8,
    emissive: 0x00ff88,
    emissiveIntensity: 0.0, // breathing drives this
  });
  const strip = new THREE.Mesh(stripGeo, stripMat);
  // Place strip in front face plane so it reads as an edge, not a cap on top.
  strip.position.set(0, 0.04, CUBE_SIZE / 2 + 0.01);
  handleGroup.add(strip);

  // Additive glow halo — this is what actually "breathes". Larger than the
  // strip and additive-blended so it reads as neon rather than plastic.
  const glowGeo = new THREE.BoxGeometry(CUBE_SIZE * 1.2, 0.28, CUBE_SIZE * 0.4);
  const glowMat = new THREE.MeshBasicMaterial({
    color: 0x00ff88,
    transparent: true,
    opacity: 0.0,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  const glow = new THREE.Mesh(glowGeo, glowMat);
  glow.position.copy(strip.position);
  handleGroup.add(glow);

  // Invisible hit target — large, world-axis-aligned so it's easy to grab from
  // any camera angle. Child of the segment so it tracks.
  const hitGeo = new THREE.BoxGeometry(CUBE_SIZE * 1.6, CUBE_SIZE * 0.8, CUBE_SIZE * 0.8);
  const hitMat = new THREE.MeshBasicMaterial({
    transparent: true,
    opacity: 0.0,
    depthWrite: false,
  });
  const hitMesh = new THREE.Mesh(hitGeo, hitMat);
  hitMesh.position.copy(strip.position);
  hitMesh.renderOrder = 999;
  handleGroup.add(hitMesh);

  // Expose the same handle interface the rest of the code expects.
  handleMesh = handleGroup;
  handleMesh.userData.hitMesh = hitMesh;
  handleMesh.userData.edgeGlowMat = glowMat;
  handleMesh.userData.stripMat = stripMat;

  // Pop-in scale animation
  handleGroup.scale.set(0, 0, 0);
  gsap.to(handleGroup.scale, {
    x: 1, y: 1, z: 1, duration: 0.5, ease: "back.out(2)",
  });

  // Kick the idle timer so breathing starts ~3s after the pop-in.
  lastInteractionTime = performance.now() / 1000;
}

// ── Unspool cleanup is now handled in completeHandleDrag (drag-based flow).
// The old tap-to-unspool entry point was removed because the handle now
// responds to pointer motion immediately from the moment the user grabs it.

// Rebuild the intact 12-segment obelisk from scratch (called after unspool)
function rebuildIntactObelisk() {
  // Remove all existing segments (they're nested inside hinge groups)
  for (const seg of obeliskSegments) {
    if (seg.mesh.parent) seg.mesh.parent.remove(seg.mesh);
    seg.mesh.geometry.dispose();
    if (Array.isArray(seg.mesh.material)) {
      seg.mesh.material.forEach((m) => m.dispose());
    } else {
      seg.mesh.material.dispose();
    }
  }
  // Remove all hinge groups
  for (const h of obeliskState.hinges) {
    if (h.group.parent) h.group.parent.remove(h.group);
  }
  obeliskSegments = [];

  // Recreate the intact obelisk as a single 12-unit-tall segment with "12"
  // engraved on the front face. This keeps the visual identity of the
  // monolith ("the number 12") rather than showing 12 stacked cubes.
  const segH = NUM_CUBES * CUBE_SIZE;
  const mesh = createSegmentMesh(segH, NUM_CUBES);
  mesh.position.set(0, segH / 2, 0);
  obeliskGroup.add(mesh);
  obeliskSegments.push({ mesh, level: 0 });
}

// ── Sync & Render Loop ──────────────────────────────────────────────
const clock = new THREE.Clock();

function loop() {
  requestAnimationFrame(loop);

  const elapsed = clock.getElapsedTime();

  // Step the physics world (fixed timestep)
  world.step();

  // Sync every dynamic body
  for (const { mesh, rigidBody } of bodies) {
    const pos = rigidBody.translation();
    mesh.position.set(pos.x, pos.y, pos.z);

    const rot = rigidBody.rotation();
    mesh.quaternion.set(rot.x, rot.y, rot.z, rot.w);
  }

  // Update supernova shader time uniforms
  for (const mesh of primeShaderMeshes) {
    if (mesh.material.uniforms && mesh.material.uniforms.uTime) {
      mesh.material.uniforms.uTime.value = elapsed;
    }
  }

  // Update mirror cube camera for '1' block (if it exists)
  if (mirrorCubeCamera && mirrorMesh) {
    mirrorMesh.visible = false;
    mirrorCubeCamera.position.copy(mirrorMesh.position);
    mirrorCubeCamera.update(renderer, scene);
    mirrorMesh.visible = true;
  }

  // Update breathing hints on idle hinges
  updateBreathingHints(elapsed);

  if (composer) {
    composer.render();
  } else {
    renderer.render(scene, camera);
  }
}

// ── Resize Handler ──────────────────────────────────────────────────
function onResize() {
  if (!camera || !renderer) return;

  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  if (composer) {
    composer.setSize(window.innerWidth, window.innerHeight);
    if (bloomPass) bloomPass.setSize(window.innerWidth, window.innerHeight);
  }
  compositeScreenSize.w = window.innerWidth;
  compositeScreenSize.h = window.innerHeight;
}

// ── Mobile Initialization (gated behind user gesture) ───────────────
const startBtn = document.getElementById("startBtn");
if (startBtn) {
  startBtn.addEventListener("pointerdown", async () => {
    try {
      // Resume Audio Context for the "Thud" sounds
      if (audioCtx && audioCtx.state === "suspended") {
        await audioCtx.resume();
      }

      // Attempt to initialize the world
      await init();

      // Only remove the button if we successfully reached the loop
      startBtn.style.display = "none";
      console.log("Ignition successful.");
    } catch (err) {
      console.error("Critical Ignition Failure:", err);
      alert("App failed to start. Check console for details.");
    }
  });
}
    </script>
