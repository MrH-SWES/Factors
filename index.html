  primeDexScrollDrag.moved = Math.max(primeDexScrollDrag.moved, Math.abs(dx));
  const worldDx = dx / DEX_SCROLL_PX_PER_UNIT;
  const targetX = primeDexScrollDrag.startGroupX + worldDx;
  // Clamp to scroll bounds so cubbies don't slide off into infinity.
  const clampedX = Math.max(primeDexScrollMin, Math.min(primeDexScrollMax, targetX));
  primeDexGroup.position.x = clampedX;
  // Sync physics body so the cubby colliders move with the visible cubbies.
  if (primeDexBody) {
    primeDexBody.setNextKinematicTranslation({
      x: clampedX,
      y: primeDexGroup.position.y,
      z: primeDexGroup.position.z,
    });
  }
}

function onDexScrollEnd() {
  window.removeEventListener("pointermove", onDexScrollMove);
  window.removeEventListener("pointerup", onDexScrollEnd);
  window.removeEventListener("pointercancel", onDexScrollEnd);
  primeDexScrollDrag = null;
}

// ── Accordion Fold Animation ────────────────────────────────────────
//
// The obelisk is rebuilt as a nested tree of THREE.Groups (hinges), mirroring
// the old app's nested CSS transform architecture. Each hinge group's rotation
// cascades to all descendants, so rotating the innermost hinge lifts its single
// segment over the hinge; rotating the next-outer hinge lifts the 2-segment
// subtree above it; etc. After all hinges fire, the segments tile flat along
// the X-axis like dominoes fallen left (or right) of the base.
//
// Rotation is around the Z-axis (camera looks down -Z), so folds read visually
// identical to the old 2D app: leftward = CCW (+rot.z), rightward = CW (-rot.z).

let handleMesh = null;

function activateHinge(hingePoint) {
  if (foldingActive) return;
  if (obeliskState.pieces !== 1) return; // only fold from intact obelisk

  foldingActive = true;
  hingePoint.activated = true;

  const divisor = hingePoint.divisor;        // segment height in units
  const numPieces = NUM_CUBES / divisor;     // e.g. 12/3 = 4 segments total
  const segH = divisor * CUBE_SIZE;
  const foldDir = -1;                         // always leftward first (matches old app)

  // Hide every hinge bead while the obelisk is in its folded state — only
  // one factor is "in progress" at a time, and the beads belong to the intact
  // monolith. They'll reappear when the user unspools.
  for (const hp of hingePoints) {
    hp.ring.visible = false;
    hp.glow.visible = false;
    hp.hitMesh.visible = false;
    hp.glowMat.opacity = 0;
    if (hp.labelMat) hp.labelMat.opacity = 0;
  }

  // NOTE: Trinket spawn is deferred until after the fold animation settles
  // and the numerals/materials have been applied. See the timeline onComplete
  // below for the correct sequence (topple → material+numeral → trinket →
  // dex registration → handle).

  // ── Rebuild obelisk as nested hinge tree ────────────────────────────
  // Remove the existing 12 unit-cubes and replace with `numPieces` tall
  // segments arranged as nested groups. The base segment lives directly in
  // obeliskGroup; each subsequent segment is wrapped by a hinge THREE.Group
  // that sits at the pivot point (top edge of the segment below).

  for (const seg of obeliskSegments) {
    if (seg.mesh.parent) seg.mesh.parent.remove(seg.mesh);
    seg.mesh.geometry.dispose();
    if (Array.isArray(seg.mesh.material)) {
      seg.mesh.material.forEach((m) => m.dispose());
    } else {
      seg.mesh.material.dispose();
    }
  }
  obeliskSegments = [];
  obeliskState.hinges = [];

  // Build segments & hinges, outermost → innermost. The base is level 0 and
  // does not move. Levels 1..(numPieces-1) each introduce a hinge and a
  // segment. The hinge at level L, when rotated, carries segment L and all
  // deeper hinges/segments with it.
  //
  // Fold direction alternates per hinge. Matching the old app: depth counts
  // from 1 at the INNERMOST hinge (topmost, fires first) up to numPieces-1
  // at the outermost. dir = depth % 2 === 0 ? -foldDir : foldDir.
  // This guarantees the innermost hinge (depth=1, odd) fires with dir=foldDir
  // (leftward for the default foldDir=-1), then alternates.

  // Base segment — anchored at obeliskGroup origin. Blank during animation;
  // the numeral is engraved after the accordion settles.
  const baseSeg = createSegmentMesh(segH, null);
  baseSeg.position.set(0, segH / 2, 0);
  obeliskGroup.add(baseSeg);
  obeliskSegments.push({ mesh: baseSeg, level: 0 });

  let parent = baseSeg; // each subsequent hinge attaches to the prior segment
  for (let L = 1; L < numPieces; L++) {
    const depth = numPieces - L; // L=1 → depth=numPieces-1 (outermost); L=numPieces-1 → depth=1 (innermost)
    const dir = depth % 2 === 0 ? -foldDir : foldDir; // -1 = left/CCW, +1 = right/CW
    const targetRot = dir < 0 ? Math.PI : -Math.PI;   // leftward = +π, rightward = -π

    // Hinge group pivot — at top edge of the parent segment (in parent's local frame).
    // Parent mesh is centered at (0, 0, 0) of its own frame with height=segH.
    // Top edge y = +segH/2. Pivot x = -CUBE_SIZE/2 for leftward, +CUBE_SIZE/2 for rightward.
    const hinge = new THREE.Group();
    hinge.position.set(dir < 0 ? -CUBE_SIZE / 2 : CUBE_SIZE / 2, segH / 2, 0);
    parent.add(hinge);

    // Segment mesh sits inside hinge such that its bottom edge (and correct side)
    // rests at the hinge origin. Mesh center is offset +width/2 (opposite side of pivot)
    // and +segH/2 (above the pivot) in hinge-local coords.
    const segMesh = createSegmentMesh(segH, null);
    segMesh.position.set(dir < 0 ? CUBE_SIZE / 2 : -CUBE_SIZE / 2, segH / 2, 0);
    hinge.add(segMesh);

    obeliskSegments.push({ mesh: segMesh, level: L });
    obeliskState.hinges.push({ group: hinge, targetRot, dir, depth });

    parent = segMesh; // next iteration's hinge will attach to this segment
  }

  obeliskState.pieces = numPieces;
  obeliskState.divisor = divisor;
  obeliskState.foldDir = foldDir;

  // ── Animate the fold ─────────────────────────────────────────────────
  // Sort by depth ASCENDING — innermost (topmost, depth=1) hinge fires first.
  const sortedHinges = [...obeliskState.hinges].sort((a, b) => a.depth - b.depth);

  const tl = gsap.timeline({
    onComplete: () => {
      // STEP 1: Apply material + engrave numerals on the now-settled segments.
      // For prime divisors each segment gets the supernova shader; for composite
      // divisors each segment gets its numeral engraved (upright regardless of
      // whether the segment landed right-side-up or inverted).
      const segH = obeliskState.divisor * CUBE_SIZE;
      const divisorIsPrime = isPrime(obeliskState.divisor);
      for (const seg of obeliskSegments) {
        if (divisorIsPrime) {
          applyPrimeMaterialToSegment(seg.mesh, obeliskState.divisor);
        } else {
          engraveNumeralOnSegment(seg.mesh, obeliskState.divisor, segH);
        }
      }

      // Capture whether this factor is new (for trinket-drop gating) BEFORE
      // createTrinket runs its dedup check so we can branch cleanly.
      const isNewFactor = !altarTrinkets.some((t) => t.label === obeliskState.divisor);
      const isNewPrime = divisorIsPrime && !primeDexRegistered.has(obeliskState.divisor);

      // Record that this factor has been surfaced in this room, and check
      // whether the room is now fully factored (wakes the exit sigil).
      surfacedFactors.add(obeliskState.divisor);
      checkRoomFullyFactored();

      // STEP 2: If this factor is new to this room, drop the trinket onto the
      // altar in its correct numerical slot.
      if (isNewFactor) {
        const matType = divisorIsPrime ? "prime" : "composite";
        // Small delay so the "settling thud" on the segments reads as complete
        // before the trinket begins its entrance.
        gsap.delayedCall(0.25, () => {
          createTrinket(obeliskState.divisor, matType);

          // STEP 3: Then, if this prime hasn't been registered to the dex yet,
          // play the registration animation.
          if (isNewPrime) {
            gsap.delayedCall(0.55, () => {
              const sourceSeg = obeliskSegments[obeliskSegments.length - 1];
              triggerPrimeDiscovery(obeliskState.divisor, sourceSeg);
              primeDexRegistered.add(obeliskState.divisor);

              // STEP 4: Reveal handle after registration kicks off.
              gsap.delayedCall(0.3, () => {
                foldingActive = false;
                foldingComplete = true;
                revealHandle();
                lastInteractionTime = performance.now() / 1000;
              });
            });
          } else {
            // No dex registration needed — reveal handle right after trinket lands.
            gsap.delayedCall(0.5, () => {
              foldingActive = false;
              foldingComplete = true;
              revealHandle();
              lastInteractionTime = performance.now() / 1000;
            });
          }
        });
      } else {
        // Factor already seen — skip trinket entirely. Same for dex registration
        // since that hinges on trinket-drop being part of the sequence.
        foldingActive = false;
        foldingComplete = true;
        revealHandle();
        lastInteractionTime = performance.now() / 1000;
      }
    },
  });

  sortedHinges.forEach((h, i) => {
    tl.to(
      h.group.rotation,
      {
        z: h.targetRot,
        duration: 1.2,
        ease: "bounce.out",
        onStart: () => {
          // tiny haptic-equivalent: camera micro-shake at start of each fall
          if (i === 0) cameraShake(0.08, 0.1);
        },
        onComplete: () => {
          playThud();
          cameraShake(0.2, 0.25);
        },
      },
      i * 0.15 // stagger — matches old app's 0.15s stagger
    );
  });

  // Prime-discovery dex-drop is triggered from the fold timeline's onComplete
  // above (once segments have settled and had their material swapped).
}

// Helper — create a single obelisk segment mesh of given height. An optional
// numeral is engraved on the front face (+Z), which can be toggled on/off.
// Pass `numeral: null` to create a blank segment (used during the fold
// animation; numerals are applied after the accordion settles so the text
// doesn't appear upside-down mid-flip).
function createSegmentMesh(segH, numeral = null) {
  const geo = new THREE.BoxGeometry(CUBE_SIZE, segH, CUBE_SIZE);

  const baseMat = createCompositeMaterial();

  // Build a front-face material — blank by default, engraved numeral if requested.
  const frontMat = createCompositeMaterial();
  if (numeral !== null) {
    const units = Math.max(1, Math.round(segH / CUBE_SIZE));
    // Canvas aspect matches the face aspect (1 wide × `units` tall) so the
    // numeral renders without stretching.
    const canvas = document.createElement("canvas");
    canvas.width = 256;
    canvas.height = 256 * units;
    const ctx = canvas.getContext("2d");
    // Aluminum base tint — matches the composite material color
    ctx.fillStyle = "#c8ccd0";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    // Engraved-look numeral — dark, slight inset feel
    ctx.fillStyle = "rgba(20,22,28,0.55)";
    ctx.font = `bold ${Math.min(canvas.width, canvas.height) * 0.6}px 'Lexend', sans-serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(String(numeral), canvas.width / 2, canvas.height / 2);

    const tex = new THREE.CanvasTexture(canvas);
    tex.anisotropy = 8;
    frontMat.map = tex;
    frontMat.needsUpdate = true;
  }

  // BoxGeometry face order: [+X, -X, +Y, -Y, +Z, -Z]; front face (toward camera) = +Z
  const materials = [baseMat, baseMat, baseMat, baseMat, frontMat, baseMat];

  const mesh = new THREE.Mesh(geo, materials);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  // Stash a reference to the front material so we can swap in a numeral later
  mesh.userData.frontMat = frontMat;
  return mesh;
}

// Engrave a numeral onto a segment's front face (called after fold completes).
// "Gravity-aware": samples the segment's world orientation so the numeral is
// always upright (top of the number toward the ceiling) regardless of whether
// the segment flipped an even or odd number of times.
function engraveNumeralOnSegment(mesh, numeral, segH) {
  // Determine world orientation: transform the segment's local +Y into world
  // space. If world-Y is negative, the segment is upside-down and we need to
  // flip the numeral canvas so it reads upright to the viewer.
  mesh.updateWorldMatrix(true, false);
  const worldUp = new THREE.Vector3(0, 1, 0).applyQuaternion(mesh.getWorldQuaternion(new THREE.Quaternion()));
  const inverted = worldUp.y < 0;

  const units = Math.max(1, Math.round(segH / CUBE_SIZE));
  const canvas = document.createElement("canvas");
  canvas.width = 256;
  canvas.height = 256 * units;
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "#c8ccd0";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (inverted) {
    // Pre-rotate the canvas 180° so the baked texture renders upside-down
    // relative to its own UVs. Once applied to an upside-down mesh face,
    // those two inversions cancel → upright numeral in world space.
    ctx.translate(canvas.width, canvas.height);
    ctx.rotate(Math.PI);
  }

  ctx.fillStyle = "rgba(20,22,28,0.55)";
  ctx.font = `bold ${Math.min(canvas.width, canvas.height) * 0.6}px 'Lexend', sans-serif`;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(String(numeral), canvas.width / 2, canvas.height / 2);

  const tex = new THREE.CanvasTexture(canvas);
  tex.anisotropy = 8;

  const frontMat = mesh.userData.frontMat;
  if (frontMat) {
    if (frontMat.map) frontMat.map.dispose();
    frontMat.map = tex;
    frontMat.needsUpdate = true;
  }
}

// Swap a segment's material to the prime supernova shader. Used when the
// user chose a prime divisor so each resulting segment visibly glows with
// the plasma material. Done after fold settles to avoid running the
// expensive shader during the animation.
// Gravity-aware: checks the segment's world orientation so the numeral baked
// into the plasma reads upright regardless of how many 180° flips it took.
function applyPrimeMaterialToSegment(mesh, numeral) {
  mesh.updateWorldMatrix(true, false);
  const worldUp = new THREE.Vector3(0, 1, 0).applyQuaternion(mesh.getWorldQuaternion(new THREE.Quaternion()));
  const inverted = worldUp.y < 0;
  // Segment's geometric height — BoxGeometry was created with height=segH.
  // Read it back so the material's numeral canvas matches the face aspect.
  const segH = mesh.geometry.parameters ? mesh.geometry.parameters.height : CUBE_SIZE;

  const primeMat = createPrimeMaterial(numeral, inverted, segH);
  mesh.material = primeMat;
  mesh.userData.frontMat = null;
  primeShaderMeshes.push(mesh);
  const pl = new THREE.PointLight(0xff7030, 6.0, 10, 1.8);
  pl.position.set(0, 0, 0.3);
  mesh.add(pl);
}

// ── Reveal Handle (after fold completes) ────────────────────────────
// The "handle" is the original top edge of the topmost obelisk segment —
// the innermost segment in our nested hinge tree. After folds settle, that
// edge may be up in the air (even number of falls) or on the floor (odd).
//
// Visible glow knob sits on that specific edge for the VISUAL cue.
// The grab HIT ZONE is a large box covering the entire fallen row, so
// the student can pull on any part of the laid-down obelisk to rebuild it.
// This matches the mental model: you grab the "chain" anywhere and pull.
function revealHandle() {
  const endSeg = obeliskSegments[obeliskSegments.length - 1];
  if (!endSeg) return;
  const segH = obeliskState.divisor * CUBE_SIZE;

  // Visible knob — parented to end segment's original-top edge, projects +Z.
  const handleGroup = new THREE.Group();
  handleGroup.position.set(0, segH / 2, 0);
  endSeg.mesh.add(handleGroup);

  const knobRadius = 0.38;
  const knobGeo = new THREE.SphereGeometry(knobRadius, 20, 16);
  const knobMat = new THREE.MeshStandardMaterial({
    color: 0x0a2015,
    metalness: 0.2,
    roughness: 0.55,
    emissive: 0x00ff88,
    emissiveIntensity: 0.0,
  });
  const knob = new THREE.Mesh(knobGeo, knobMat);
  knob.position.set(0, 0, CUBE_SIZE / 2 + knobRadius + 0.1);
  handleGroup.add(knob);

  // Larger glow halo — cast light on nearby surfaces so the knob reads
  // as a beacon from across the room.
  const glowGeo = new THREE.SphereGeometry(knobRadius * 2.2, 20, 16);
  const glowMat = new THREE.MeshBasicMaterial({
    color: 0x00ff88,
    transparent: true,
    opacity: 0.0,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  const glow = new THREE.Mesh(glowGeo, glowMat);
  glow.position.copy(knob.position);
  handleGroup.add(glow);

  // Invisible hit zone — NOT parented to end segment; a free mesh covering
  // the whole fallen row in world space. Computed from the row's bounding
  // box so tapping anywhere on the row triggers the unspool drag.
  const rowBounds = computeFallenRowBounds();
  const hitGeo = new THREE.BoxGeometry(
    rowBounds.width + 1.0,   // slight horizontal padding
    rowBounds.height + 1.5,  // generous vertical padding
    CUBE_SIZE * 3.0          // depth extends well in front and behind
  );
  const hitMat = new THREE.MeshBasicMaterial({
    transparent: true,
    opacity: 0.0,
    depthWrite: false,
  });
  const hitMesh = new THREE.Mesh(hitGeo, hitMat);
  hitMesh.position.set(rowBounds.centerX, rowBounds.centerY, rowBounds.centerZ);
  hitMesh.renderOrder = 999;
  scene.add(hitMesh); // world-space, not parented

  // Expose handle interface
  handleMesh = handleGroup;
  handleMesh.userData.hitMesh = hitMesh;
  handleMesh.userData.edgeGlowMat = glowMat;
  handleMesh.userData.stripMat = knobMat;

  handleGroup.scale.set(0, 0, 0);
  gsap.to(handleGroup.scale, {
    x: 1, y: 1, z: 1, duration: 0.5, ease: "back.out(2)",
  });

  lastInteractionTime = performance.now() / 1000;
}

// Compute the axis-aligned world bounding box of all fallen segments so we
// can size the handle hit zone to cover the entire laid-down row.
function computeFallenRowBounds() {
  const box = new THREE.Box3();
  for (const seg of obeliskSegments) {
    seg.mesh.updateWorldMatrix(true, false);
    box.expandByObject(seg.mesh);
  }
  const min = box.min, max = box.max;
  return {
    width:  max.x - min.x,
    height: max.y - min.y,
    depth:  max.z - min.z,
    centerX: (min.x + max.x) / 2,
    centerY: (min.y + max.y) / 2,
    centerZ: (min.z + max.z) / 2,
  };
}

// ── Unspool cleanup is now handled in completeHandleDrag (drag-based flow).
// The old tap-to-unspool entry point was removed because the handle now
// responds to pointer motion immediately from the moment the user grabs it.

// Rebuild the intact 12-segment obelisk from scratch (called after unspool)
function rebuildIntactObelisk() {
  // Remove all existing segments (they're nested inside hinge groups)
  for (const seg of obeliskSegments) {
    if (seg.mesh.parent) seg.mesh.parent.remove(seg.mesh);
    seg.mesh.geometry.dispose();
    if (Array.isArray(seg.mesh.material)) {
      seg.mesh.material.forEach((m) => m.dispose());
    } else {
      seg.mesh.material.dispose();
    }
  }
  // Remove all hinge groups
  for (const h of obeliskState.hinges) {
    if (h.group.parent) h.group.parent.remove(h.group);
  }
  obeliskSegments = [];

  // Recreate the intact obelisk as a single 12-unit-tall segment with "12"
  // engraved on the front face. This keeps the visual identity of the
  // monolith ("the number 12") rather than showing 12 stacked cubes.
  const segH = NUM_CUBES * CUBE_SIZE;
  const mesh = createSegmentMesh(segH, NUM_CUBES);
  mesh.position.set(0, segH / 2, 0);
  obeliskGroup.add(mesh);
  obeliskSegments.push({ mesh, level: 0 });
}

// ── Sync & Render Loop ──────────────────────────────────────────────
const clock = new THREE.Clock();

function loop() {
  requestAnimationFrame(loop);

  const elapsed = clock.getElapsedTime();

  // Step the physics world (fixed timestep)
  world.step();

  // Sync every dynamic body
  for (const { mesh, rigidBody } of bodies) {
    const pos = rigidBody.translation();
    mesh.position.set(pos.x, pos.y, pos.z);

    const rot = rigidBody.rotation();
    mesh.quaternion.set(rot.x, rot.y, rot.z, rot.w);
  }

  // Update supernova shader time uniforms
  for (const mesh of primeShaderMeshes) {
    if (mesh.material.uniforms && mesh.material.uniforms.uTime) {
      mesh.material.uniforms.uTime.value = elapsed;
    }
  }

  // Update mirror cube camera for '1' block (if it exists)
  if (mirrorCubeCamera && mirrorMesh) {
    mirrorMesh.visible = false;
    mirrorCubeCamera.position.copy(mirrorMesh.position);
    mirrorCubeCamera.update(renderer, scene);
    mirrorMesh.visible = true;
  }

  // Update breathing hints on idle hinges
  updateBreathingHints(elapsed);

  if (composer) {
    composer.render();
  } else {
    renderer.render(scene, camera);
  }
}

// ── Resize Handler ──────────────────────────────────────────────────
function onResize() {
  if (!camera || !renderer) return;

  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  if (composer) {
    composer.setSize(window.innerWidth, window.innerHeight);
    if (bloomPass) bloomPass.setSize(window.innerWidth, window.innerHeight);
  }
  compositeScreenSize.w = window.innerWidth;
  compositeScreenSize.h = window.innerHeight;
}

// ── Mobile Initialization (gated behind user gesture) ───────────────
const startBtn = document.getElementById("startBtn");
if (startBtn) {
  startBtn.addEventListener("pointerdown", async () => {
    try {
      // Resume Audio Context for the "Thud" sounds
      if (audioCtx && audioCtx.state === "suspended") {
        await audioCtx.resume();
      }

      // Attempt to initialize the world
      await init();

      // Only remove the button if we successfully reached the loop
      startBtn.style.display = "none";
      console.log("Ignition successful.");
    } catch (err) {
      console.error("Critical Ignition Failure:", err);
      alert("App failed to start. Check console for details.");
    }
  });
}
    </script>
